<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, Segoe UI, Arial, sans-serif;
      width: 300px;
      padding: 16px;
      color: #1a1a1a;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    .field { margin-bottom: 14px; }
    select, input[type="date"] {
      width: 100%;
      padding: 9px 10px;
      font-size: 13px;
      border: 1px solid #d8d8d8;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
    }
    .date-range {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .date-range input { flex: 1; }
    .date-range span { color: #999; font-size: 12px; }

    .format-options {
      display: flex;
      gap: 8px;
    }
    .format-option {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid #d8d8d8;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .format-option input { display: none; }
    .format-option.selected {
      border-color: #2e7d32;
      background: #f0f8f1;
    }
    .format-icon {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .icon-xlsx { background: #1d6f3a; }
    .icon-csv { background: #6c7a89; }

    #exportBtn {
      width: 100%;
      padding: 12px;
      margin-top: 4px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: #e8521e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #exportBtn:hover { background: #d4481a; }

    #status { margin-top: 10px; font-size: 12px; color: #555; text-align: center; }
  </style>
</head>
<body>
  <h1>AliExpress Orders Report</h1>

  <div class="field">
    <label for="dateFrom">Date Range</label>
    <div class="date-range">
      <input type="date" id="dateFrom">
      <span>-</span>
      <input type="date" id="dateTo">
    </div>
  </div>

  <div class="field">
    <label for="statusFilter">Status</label>
    <select id="statusFilter">
      <option value="all">All Status</option>
      <option value="completed">Completed</option>
      <option value="in-progress">In Progress</option>
      <option value="cancelled">Cancelled</option>
      <option value="expired">Expired</option>
    </select>
  </div>

  <div class="field">
    <label>Download Format</label>
    <div class="format-options">
      <label class="format-option selected" id="optXlsx">
        <input type="radio" name="format" value="xlsx" checked>
        <span class="format-icon icon-xlsx">X</span>
        Excel (XLSX)
      </label>
      <label class="format-option" id="optCsv">
        <input type="radio" name="format" value="csv">
        <span class="format-icon icon-csv">CSV</span>
        CSV
      </label>
    </div>
  </div>

  <button id="exportBtn">⬇ Export Orders</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
